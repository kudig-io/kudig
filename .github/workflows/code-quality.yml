name: Code Quality Check

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    # 每天凌晨 2 点运行
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  shellcheck:
    name: ShellCheck 静态分析
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout 代码
        uses: actions/checkout@v4
      
      - name: 运行 ShellCheck
        uses: ludeeus/action-shellcheck@v2
        with:
          scandir: '.'
          severity: warning
          format: gcc
          
      - name: 上传 ShellCheck 报告
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: shellcheck-report
          path: shellcheck.log
          retention-days: 30

  format-check:
    name: 代码格式检查
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout 代码
        uses: actions/checkout@v4
      
      - name: 安装 shfmt
        run: |
          wget -O shfmt https://github.com/mvdan/sh/releases/download/v3.7.0/shfmt_v3.7.0_linux_amd64
          chmod +x shfmt
          sudo mv shfmt /usr/local/bin/
      
      - name: 检查代码格式
        run: |
          echo "Checking Shell script formatting..."
          shfmt -d -i 4 -bn -ci -sr *.sh
      
      - name: 格式化建议
        if: failure()
        run: |
          echo "::warning::Code formatting issues detected. Run 'shfmt -w -i 4 -bn -ci -sr *.sh' to fix."
  
  custom-checks:
    name: 自定义规则检查
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout 代码
        uses: actions/checkout@v4
      
      - name: 运行自定义检查
        run: |
          chmod +x scripts/quality_check.sh
          bash scripts/quality_check.sh --verbose kudig
      
      - name: 检查结果
        if: failure()
        run: |
          echo "::error::Custom quality checks failed. Please review the output above."

  security-scan:
    name: 安全扫描
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout 代码
        uses: actions/checkout@v4
      
      - name: ShellCheck 安全规则
        run: |
          echo "Running security-focused ShellCheck..."
          shellcheck -S error *.sh || echo "::warning::Security issues detected"
      
      - name: 检查危险命令模式
        run: |
          echo "Scanning for dangerous patterns..."
          
          # 检查 eval 使用
          if grep -n 'eval ' *.sh 2>/dev/null; then
            echo "::warning::Usage of 'eval' detected, please review for security"
          fi
          
          # 检查未引用的变量
          if grep -nE '\$[A-Z_]+[^{]' *.sh | grep -v '"\$' 2>/dev/null; then
            echo "::warning::Unquoted variables detected"
          fi

  unit-test:
    name: 单元测试
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout 代码
        uses: actions/checkout@v4
      
      - name: 安装 bats-core
        run: |
          sudo apt-get update
          sudo apt-get install -y bats
      
      - name: 创建测试目录
        run: |
          mkdir -p tests/unit
          mkdir -p tests/fixtures
      
      - name: 运行单元测试
        run: |
          if [ -d tests/unit ] && [ "$(ls -A tests/unit/*.bats 2>/dev/null)" ]; then
            bats tests/unit/
          else
            echo "::warning::No unit tests found. Creating placeholder..."
            echo '#!/usr/bin/env bats' > tests/unit/placeholder.bats
            echo '@test "placeholder test" { true; }' >> tests/unit/placeholder.bats
            bats tests/unit/placeholder.bats
          fi
      
      - name: 生成测试覆盖率报告
        if: success()
        run: |
          cd v2-go
          go test -buildvcs=false ./pkg/... -coverprofile=coverage.out
          go tool cover -func=coverage.out
      
      - name: 上传覆盖率到 Codecov
        if: success()
        uses: codecov/codecov-action@v4
        with:
          files: ./v2-go/coverage.out
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false
          verbose: true

  integration-test:
    name: 集成测试
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout 代码
        uses: actions/checkout@v4
      
      - name: 准备测试数据
        run: |
          # 使用 reference 目录的数据作为测试数据
          if [ -d reference/diagnose_k8s/diagnose_1765626516 ]; then
            echo "Test data available"
          fi
      
      - name: 运行基本功能测试
        run: |
          chmod +x kudig
          
          # 测试帮助信息
          ./kudig --help
          
          # 测试版本信息
          ./kudig --version
          
          # 测试诊断分析（如果有测试数据）
          if [ -d reference/diagnose_k8s/diagnose_1765626516 ]; then
            ./kudig reference/diagnose_k8s/diagnose_1765626516 || true
            ./kudig --json reference/diagnose_k8s/diagnose_1765626516 > /tmp/report.json || true
          fi
      
      - name: 验证 JSON 输出
        run: |
          if [ -f /tmp/report.json ]; then
            echo "Validating JSON output..."
            python3 -m json.tool /tmp/report.json > /dev/null && echo "JSON valid" || echo "::error::Invalid JSON output"
          fi

  compatibility-test:
    name: 兼容性测试 - ${{ matrix.os }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        os: 
          - 'ubuntu:20.04'
          - 'ubuntu:22.04'
          - 'debian:11'
      fail-fast: false
    
    container:
      image: ${{ matrix.os }}
    
    steps:
      - name: Checkout 代码
        uses: actions/checkout@v4
      
      - name: 安装依赖
        run: |
          apt-get update
          apt-get install -y bash grep gawk sed coreutils findutils
      
      - name: 运行基本测试
        run: |
          bash --version
          chmod +x kudig
          bash kudig --help
          bash kudig --version
      
      - name: 功能测试
        run: |
          if [ -d reference/diagnose_k8s/diagnose_1765626516 ]; then
            bash kudig reference/diagnose_k8s/diagnose_1765626516 || echo "Test completed with exit code $?"
          fi

  quality-report:
    name: 生成质量报告
    needs: [shellcheck, format-check, custom-checks, security-scan, unit-test, integration-test]
    runs-on: ubuntu-latest
    if: always()
    
    steps:
      - name: Checkout 代码
        uses: actions/checkout@v4
      
      - name: 下载所有报告
        uses: actions/download-artifact@v8
        with:
          path: reports/
        continue-on-error: true
      
      - name: 生成质量报告摘要
        run: |
          echo "# 代码质量检查报告" > quality-summary.md
          echo "" >> quality-summary.md
          echo "**检查时间**: $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> quality-summary.md
          echo "" >> quality-summary.md
          
          echo "## 检查结果" >> quality-summary.md
          echo "" >> quality-summary.md
          echo "| 检查项 | 状态 |" >> quality-summary.md
          echo "|--------|------|" >> quality-summary.md
          echo "| ShellCheck | ${{ needs.shellcheck.result }} |" >> quality-summary.md
          echo "| 格式检查 | ${{ needs.format-check.result }} |" >> quality-summary.md
          echo "| 自定义规则 | ${{ needs.custom-checks.result }} |" >> quality-summary.md
          echo "| 安全扫描 | ${{ needs.security-scan.result }} |" >> quality-summary.md
          echo "| 单元测试 | ${{ needs.unit-test.result }} |" >> quality-summary.md
          echo "| 集成测试 | ${{ needs.integration-test.result }} |" >> quality-summary.md
          echo "" >> quality-summary.md
          
          # 计算通过率
          TOTAL=6
          PASSED=$(echo "${{ needs.shellcheck.result }} ${{ needs.format-check.result }} ${{ needs.custom-checks.result }} ${{ needs.security-scan.result }} ${{ needs.unit-test.result }} ${{ needs.integration-test.result }}" | grep -o "success" | wc -l)
          PASS_RATE=$(awk "BEGIN {printf \"%.0f\", ($PASSED/$TOTAL)*100}")
          
          echo "**通过率**: $PASS_RATE% ($PASSED/$TOTAL)" >> quality-summary.md
          
          cat quality-summary.md
      
      - name: 评论到 PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const summary = fs.readFileSync('quality-summary.md', 'utf8');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: summary
            });
      
      - name: 上传质量报告
        uses: actions/upload-artifact@v4
        with:
          name: quality-summary
          path: quality-summary.md
          retention-days: 90
      
      - name: 设置工作流状态
        if: contains(needs.*.result, 'failure')
        run: |
          echo "::error::Some quality checks failed"
          exit 1

  # 新增: Trivy 容器镜像安全扫描
  trivy-scan:
    name: Trivy 镜像安全扫描
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout 代码
        uses: actions/checkout@v4
      
      - name: 构建测试镜像
        run: |
          cd v2-go
          docker build -t kudig:test .
      
      - name: Trivy 镜像扫描
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'kudig:test'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'  # 不阻断构建，仅报告
      
      - name: 上传扫描结果
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'
      
      - name: 显示扫描摘要
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'kudig:test'
          format: 'table'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'

  # 新增: gitleaks 密钥泄露扫描
  gitleaks:
    name: Secret 泄露检测
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout 代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 需要完整历史记录
      
      - name: Gitleaks 扫描
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}  # 可选：商业版许可
        continue-on-error: true  # 先收集结果，不阻断
      
      - name: 手动 Secret 扫描（备用）
        if: failure()
        run: |
          echo "::warning::Gitleaks detected potential secrets. Review the findings above."
          echo "If these are false positives, add them to .gitleaksignore"

  # 新增: SBOM 生成
  sbom-generation:
    name: SBOM 生成
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout 代码
        uses: actions/checkout@v4
      
      - name: 安装 Syft
        uses: anchore/sbom-action/download-syft@v0
      
      - name: 生成 Go 模块 SBOM
        run: |
          cd v2-go
          syft scan dir:. -o spdx-json=../sbom-go.spdx.json \
            --source-name "kudig-go" \
            --source-version "${{ github.sha }}"
      
      - name: 生成 项目 SBOM
        run: |
          syft scan dir:. -o spdx-json=sbom-project.spdx.json \
            --source-name "kudig" \
            --source-version "${{ github.sha }}"
      
      - name: 生成 CycloneDX 格式
        run: |
          cd v2-go
          syft scan dir:. -o cyclonedx-json=../sbom-go.cyclonedx.json
      
      - name: 上传 SBOM 产物
        uses: actions/upload-artifact@v4
        with:
          name: sbom-reports
          path: |
            sbom-*.spdx.json
            sbom-*.cyclonedx.json
          retention-days: 90
      
      - name: 显示 SBOM 摘要
        run: |
          echo "## SBOM 生成摘要" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 格式 | 文件 |" >> $GITHUB_STEP_SUMMARY
          echo "|------|------|" >> $GITHUB_STEP_SUMMARY
          echo "| SPDX (Go) | sbom-go.spdx.json |" >> $GITHUB_STEP_SUMMARY
          echo "| SPDX (Project) | sbom-project.spdx.json |" >> $GITHUB_STEP_SUMMARY
          echo "| CycloneDX | sbom-go.cyclonedx.json |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**提交**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
