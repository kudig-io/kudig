# Default values for kudig
# This is a YAML-formatted file. Declare variables to be passed into your templates.

# -- Number of replicas (only used when deploymentMode is "deployment")
replicaCount: 1

image:
  # -- Image repository
  repository: kudig/kudig
  # -- Image pull policy
  pullPolicy: IfNotPresent
  # -- Image tag (defaults to chart appVersion if empty)
  tag: ""

# -- Image pull secrets
imagePullSecrets: []
# -- Override name of the chart
nameOverride: ""
# -- Override full name of the chart
fullnameOverride: ""

# -- Deploy as DaemonSet to run on all nodes, or Deployment for single instance
# @enum daemonset, deployment
deploymentMode: daemonset

serviceAccount:
  # -- Specifies whether a service account should be created
  create: true
  # -- Annotations to add to the service account
  annotations: {}
  # -- The name of the service account to use (generated if empty)
  name: ""

# -- Annotations to add to pods
podAnnotations: {}

# -- Pod security context
podSecurityContext:
  runAsNonRoot: false
  runAsUser: 0
  runAsGroup: 0
  fsGroup: 0

# -- Container security context
securityContext:
  privileged: true
  allowPrivilegeEscalation: true
  readOnlyRootFilesystem: false
  capabilities:
    add:
      - SYS_PTRACE
      - NET_ADMIN
      - SYS_ADMIN
      - SYS_RAWIO

# -- Resource requests and limits
resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 128Mi

# -- Node selector for pod assignment
# Example:
# nodeSelector:
#   kubernetes.io/os: linux
#   node-role.kubernetes.io/worker: "true"
nodeSelector: {}

# -- Tolerations for pod assignment
# By default, tolerates all taints to run on all nodes
tolerations:
  - operator: Exists
    effect: NoSchedule
  - operator: Exists
    effect: NoExecute

# -- Affinity rules for pod assignment
# Example:
# affinity:
#   nodeAffinity:
#     requiredDuringSchedulingIgnoredDuringExecution:
#       nodeSelectorTerms:
#         - matchExpressions:
#             - key: kubernetes.io/arch
#               operator: In
#               values:
#                 - amd64
#                 - arm64
affinity: {}

# -- Pod topology spread constraints
# Example:
# topologySpreadConstraints:
#   - maxSkew: 1
#     topologyKey: topology.kubernetes.io/zone
#     whenUnsatisfiable: DoNotSchedule
#     labelSelector:
#       matchLabels:
#         app.kubernetes.io/name: kudig
topologySpreadConstraints: []

# -- Pod priority class name
# Example: system-node-critical, system-cluster-critical
priorityClassName: ""

# -- DNS policy for the pod
# Set to ClusterFirstWithHostNet when using hostNetwork
dnsPolicy: ClusterFirst

# -- Enable host network access
hostNetwork: false

# -- Enable host PID access (required for some diagnostics)
hostPID: true

# -- Enable host IPC access
hostIPC: false

# -- Pod restart policy
restartPolicy: Always

# -- Termination grace period in seconds
terminationGracePeriodSeconds: 30

# -- Pod disruption budget (only for deployment mode)
podDisruptionBudget:
  enabled: false
  minAvailable: 1
  # maxUnavailable: 1

# -- Horizontal pod autoscaling (only for deployment mode)
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 80
  behavior: {}

# -- Liveness probe configuration
livenessProbe:
  enabled: true
  httpGet:
    path: /healthz
    port: 8080
  initialDelaySeconds: 10
  periodSeconds: 30
  timeoutSeconds: 5
  failureThreshold: 3
  successThreshold: 1

# -- Readiness probe configuration
readinessProbe:
  enabled: true
  httpGet:
    path: /readyz
    port: 8080
  initialDelaySeconds: 5
  periodSeconds: 10
  timeoutSeconds: 3
  failureThreshold: 3
  successThreshold: 1

# -- Startup probe configuration
startupProbe:
  enabled: false
  httpGet:
    path: /healthz
    port: 8080
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 30

# -- Additional environment variables
env: []
# - name: LOG_LEVEL
#   value: "info"

# -- Additional environment variables from ConfigMap/Secret
envFrom: []
# - configMapRef:
#     name: kudig-config
# - secretRef:
#     name: kudig-secrets

# kudig specific configuration
config:
  # -- Enable verbose output
  verbose: false
  # -- Output format: text, json
  format: json
  # -- Custom rules directory (mounted from ConfigMap)
  rulesDir: /app/rules
  # -- Schedule for periodic diagnosis (cron format, only for deployment mode)
  schedule: "0 */6 * * *"
  # -- Timeout for diagnosis in seconds
  timeout: 300
  # -- Categories to analyze (empty means all)
  categories: []
  # - system
  # - network
  # - kubernetes

# -- Custom rules ConfigMap
customRules:
  enabled: false
  # -- Custom rules YAML content
  rules: {}
  # example-rule:
  #   id: "CUSTOM_001"
  #   name: "Custom Check"
  #   category: "custom"
  #   severity: "warning"
  #   condition:
  #     type: "file_contains"
  #     file: "/var/log/custom.log"
  #     pattern: "ERROR"

# RBAC settings
rbac:
  # -- Create RBAC resources
  create: true
  # -- Additional RBAC rules
  extraRules: []
  # -- Cluster role binding configuration
  clusterRoleBinding:
    # -- Create cluster-wide role binding (required for node-level diagnostics)
    create: true

# -- Volume mounts for host filesystem access
hostPaths:
  - name: host-root
    hostPath: /
    mountPath: /host
    readOnly: true
  - name: var-log
    hostPath: /var/log
    mountPath: /var/log
    readOnly: true
  - name: etc
    hostPath: /etc
    mountPath: /etc/host
    readOnly: true
  - name: run
    hostPath: /run
    mountPath: /run/host
    readOnly: true

# -- Additional volumes
extraVolumes: []
# - name: custom-config
#   configMap:
#     name: custom-config

# -- Additional volume mounts
extraVolumeMounts: []
# - name: custom-config
#   mountPath: /app/config

# -- Init containers
initContainers: []
# - name: init
#   image: busybox
#   command: ['sh', '-c', 'echo init']

# -- Sidecar containers
sidecars: []

# Prometheus metrics configuration
metrics:
  # -- Enable Prometheus metrics endpoint
  enabled: false
  # -- Metrics port
  port: 9090
  # -- Metrics path
  path: /metrics
  # -- ServiceMonitor configuration (for Prometheus Operator)
  serviceMonitor:
    enabled: false
    namespace: ""
    interval: 30s
    scrapeTimeout: 10s
    labels: {}
    # -- Relabeling rules for ServiceMonitor
    relabelings: []
    # -- Metric relabeling rules
    metricRelabelings: []

# Network policy configuration
networkPolicy:
  # -- Enable network policy
  enabled: false
  # -- Policy types
  policyTypes:
    - Ingress
    - Egress
  # -- Ingress rules
  ingress: []
  # -- Egress rules
  egress: []

# Service configuration (for deployment mode with metrics)
service:
  type: ClusterIP
  port: 80
  targetPort: 8080
  annotations: {}

# -- Update strategy for DaemonSet/Deployment
updateStrategy:
  type: RollingUpdate
  rollingUpdate:
    maxUnavailable: 1
    maxSurge: 0

# -- Pod lifecycle hooks
lifecycle: {}
# postStart:
#   exec:
#     command: ["/bin/sh", "-c", "echo postStart"]
# preStop:
#   exec:
#     command: ["/bin/sh", "-c", "echo preStop"]

# -- Secrets to mount
secrets: {}
# my-secret:
#   mountPath: /app/secrets
#   readOnly: true
