{{- if .Values.customRules.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "kudig.fullname" . }}-rules
  labels:
    {{- include "kudig.labels" . | nindent 4 }}
data:
  custom.yaml: |
    version: "1.0"
    name: "helm-custom-rules"
    description: "Custom rules from Helm values"
    rules:
      {{- toYaml .Values.customRules.rules | nindent 6 }}
{{- end }}
