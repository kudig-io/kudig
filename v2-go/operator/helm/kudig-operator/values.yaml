# Default values for kudig-operator.
replicaCount: 1

image:
  repository: kudig/kudig-operator
  pullPolicy: IfNotPresent
  tag: "latest"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  name: "kudig-operator"

rbac:
  # Specifies whether RBAC resources should be created
  create: true

podAnnotations: {}

podSecurityContext:
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true
  runAsUser: 1000

resources:
  limits:
    cpu: 500m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi

nodeSelector: {}

tolerations: []

affinity: {}

# Operator configuration
operator:
  # Enable leader election for high availability
  leaderElection:
    enabled: true
  
  # Health probe configuration
  healthProbe:
    port: 8081
  
  # Metrics configuration
  metrics:
    enabled: true
    port: 8080
    service:
      enabled: true
      type: ClusterIP

# Webhook configuration (future use)
webhook:
  enabled: false
  port: 9443
