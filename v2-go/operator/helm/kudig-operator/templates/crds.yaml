{{/*
CRD definitions for kudig.io
In production, these should be managed separately or use operator-sdk/kubebuilder
*/}}
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: clusterdiagnostics.kudig.io
  annotations:
    controller-gen.kubebuilder.io/version: v0.11.3
spec:
  group: kudig.io
  names:
    kind: ClusterDiagnostic
    listKind: ClusterDiagnosticList
    plural: clusterdiagnostics
    singular: clusterdiagnostic
    shortNames:
    - cdiag
  scope: Cluster
  versions:
  - name: v1
    served: true
    storage: true
    schema:
      openAPIV3Schema:
        description: ClusterDiagnostic is the Schema for the clusterdiagnostics API
        type: object
        properties:
          apiVersion:
            type: string
          kind:
            type: string
          metadata:
            type: object
          spec:
            type: object
            properties:
              mode:
                type: string
                enum: ["online", "offline"]
              analyzers:
                type: array
                items:
                  type: string
              excludeAnalyzers:
                type: array
                items:
                  type: string
              outputFormat:
                type: string
                enum: ["text", "json", "html"]
              schedule:
                type: string
              notify:
                type: object
                properties:
                  enabled:
                    type: boolean
                  webhookURL:
                    type: string
                  minSeverity:
                    type: string
                    enum: ["info", "warning", "critical"]
          status:
            type: object
            properties:
              phase:
                type: string
                enum: ["Pending", "Running", "Completed", "Failed"]
              startTime:
                type: string
                format: date-time
              completionTime:
                type: string
                format: date-time
              summary:
                type: object
                properties:
                  total:
                    type: integer
                  critical:
                    type: integer
                  warning:
                    type: integer
                  info:
                    type: integer
                  analyzersRun:
                    type: integer
              conditions:
                type: array
                items:
                  type: object
                  properties:
                    type:
                      type: string
                    status:
                      type: string
                    lastTransitionTime:
                      type: string
                      format: date-time
                    reason:
                      type: string
                    message:
                      type: string
              reportLocation:
                type: string
    subresources:
      status: {}
---
