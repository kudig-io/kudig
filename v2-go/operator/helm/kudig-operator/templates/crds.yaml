apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: diagnosticschedules.kudig.io
spec:
  group: kudig.io
  names:
    kind: DiagnosticSchedule
    listKind: DiagnosticScheduleList
    plural: diagnosticschedules
    singular: diagnosticschedule
    shortNames:
    - dsched
  scope: Cluster
  versions:
  - name: v1
    served: true
    storage: true
    schema:
      openAPIV3Schema:
        description: DiagnosticSchedule is the Schema for the diagnosticschedules API
        type: object
        properties:
          apiVersion:
            type: string
          kind:
            type: string
          metadata:
            type: object
          spec:
            type: object
            properties:
              schedule:
                type: string
              suspend:
                type: boolean
              type:
                type: string
                enum: ["cluster", "node"]
              clusterDiagnosticTemplate:
                type: object
                properties:
                  mode:
                    type: string
                  analyzers:
                    type: array
                    items:
                      type: string
                  excludeAnalyzers:
                    type: array
                    items:
                      type: string
                  outputFormat:
                    type: string
              nodeDiagnosticTemplate:
                type: object
                properties:
                  mode:
                    type: string
                  nodeSelector:
                    type: object
                    additionalProperties:
                      type: string
                  analyzers:
                    type: array
                    items:
                      type: string
                  excludeAnalyzers:
                    type: array
                    items:
                      type: string
                  outputFormat:
                    type: string
              historyLimit:
                type: integer
          status:
            type: object
            properties:
              lastRunTime:
                type: string
                format: date-time
              lastSuccessfulRun:
                type: string
                format: date-time
              active:
                type: array
                items:
                  type: object
                  properties:
                    kind:
                      type: string
                    namespace:
                      type: string
                    name:
                      type: string
              conditions:
                type: array
                items:
                  type: object
    subresources:
      status: {}
