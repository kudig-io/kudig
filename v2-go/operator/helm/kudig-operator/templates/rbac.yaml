{{- if .Values.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "kudig-operator.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kudig-operator.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
---
{{- end }}

{{- if .Values.rbac.create -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "kudig-operator.fullname" . }}
  labels:
    {{- include "kudig-operator.labels" . | nindent 4 }}
rules:
# CRD management
- apiGroups:
  - kudig.io
  resources:
  - clusterdiagnostics
  - clusterdiagnostics/status
  - clusterdiagnostics/finalizers
  - nodediagnostics
  - nodediagnostics/status
  - nodediagnostics/finalizers
  - diagnosticschedules
  - diagnosticschedules/status
  - diagnosticschedules/finalizers
  verbs:
  - get
  - list
  - watch
  - create
  - update
  - patch
  - delete
# Jobs management
- apiGroups:
  - batch
  resources:
  - jobs
  verbs:
  - get
  - list
  - watch
  - create
  - update
  - patch
  - delete
# Pods, Nodes, ConfigMaps
- apiGroups:
  - ""
  resources:
  - pods
  - nodes
  - configmaps
  - secrets
  - serviceaccounts
  - namespaces
  verbs:
  - get
  - list
  - watch
# RBAC
- apiGroups:
  - rbac.authorization.k8s.io
  resources:
  - clusterroles
  - clusterrolebindings
  - roles
  - rolebindings
  verbs:
  - get
  - list
  - watch
# Network policies
- apiGroups:
  - networking.k8s.io
  resources:
  - networkpolicies
  verbs:
  - get
  - list
  - watch
# Storage
- apiGroups:
  - storage.k8s.io
  resources:
  - storageclasses
  - volumeattachments
  - csidrivers
  verbs:
  - get
  - list
  - watch
# Events
- apiGroups:
  - ""
  resources:
  - events
  verbs:
  - create
  - patch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "kudig-operator.fullname" . }}
  labels:
    {{- include "kudig-operator.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "kudig-operator.fullname" . }}
subjects:
- kind: ServiceAccount
  name: {{ include "kudig-operator.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
{{- end }}
