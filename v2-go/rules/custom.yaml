# kudig custom rules example
version: "1.0"
name: "custom-rules"
description: "Custom diagnostic rules for your environment"

rules:
  # System rules
  - id: HIGH_CPU_LOAD_CUSTOM
    name: "CPU负载过高(自定义阈值)"
    description: "检查CPU负载是否超过自定义阈值"
    category: system
    severity: warning
    enabled: true
    condition:
      type: metric_threshold
      metric: load_avg_1min
      operator: gt
      threshold: 0.7
    remediation: "检查高CPU使用进程: top -c; htop"
    tags:
      - system
      - cpu

  - id: MEMORY_CRITICAL
    name: "内存使用率严重不足"
    description: "检查内存使用率是否超过95%"
    category: system
    severity: critical
    enabled: true
    condition:
      type: metric_threshold
      metric: mem_used_percent
      operator: gt
      threshold: 95
    remediation: "立即检查内存使用: free -h; 考虑重启高内存进程"
    tags:
      - system
      - memory

  # Kubernetes rules
  - id: KUBELET_OOM
    name: "Kubelet OOM事件"
    description: "检查Kubelet日志中的OOM事件"
    category: kubernetes
    severity: critical
    enabled: true
    condition:
      type: file_contains
      file: logs/kubelet.log
      pattern: "OOMKilled|oom_kill|memory cgroup out of memory"
    remediation: "检查Pod内存限制; 增加节点内存或优化应用"
    tags:
      - kubernetes
      - memory
      - oom

  - id: POD_EVICTION
    name: "Pod驱逐事件"
    description: "检查是否有Pod被驱逐"
    category: kubernetes
    severity: warning
    enabled: true
    condition:
      type: file_contains
      file: logs/kubelet.log
      pattern: "evict|Evicted"
      count: 3
    remediation: "检查节点资源使用情况; 调整eviction阈值"
    tags:
      - kubernetes
      - eviction

  # Network rules
  - id: CONNTRACK_HIGH
    name: "连接跟踪表使用率高"
    description: "检查conntrack使用率是否超过80%"
    category: network
    severity: warning
    enabled: true
    condition:
      type: metric_threshold
      metric: conntrack_percent
      operator: gt
      threshold: 80
    remediation: "增加conntrack限制: sysctl -w net.netfilter.nf_conntrack_max=262144"
    tags:
      - network
      - conntrack

  # Compound rules (AND/OR)
  - id: CRITICAL_SERVICE_DOWN
    name: "关键服务停止"
    description: "检查kubelet或容器运行时是否停止"
    category: kubernetes
    severity: critical
    enabled: true
    condition:
      type: or
      or:
        - type: file_contains
          file: service_status
          pattern: "kubelet.*inactive"
        - type: file_contains
          file: service_status
          pattern: "containerd.*inactive"
        - type: file_contains
          file: service_status
          pattern: "docker.*inactive"
    remediation: "重启关键服务: systemctl restart kubelet containerd"
    tags:
      - kubernetes
      - service

  - id: DISK_AND_INODE_PRESSURE
    name: "磁盘空间和Inode双重压力"
    description: "同时存在磁盘空间和Inode不足"
    category: system
    severity: critical
    enabled: true
    condition:
      type: and
      and:
        - type: metric_threshold
          metric: disk_used_percent
          operator: gt
          threshold: 90
        - type: file_contains
          file: system_status
          pattern: "Inode.*9[0-9]%|Inode.*100%"
    remediation: "清理磁盘空间和Inode: 删除无用文件和小文件"
    tags:
      - system
      - disk
      - inode
